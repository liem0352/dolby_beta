name: Sync UnblockNeteaseMusic & Build

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches:
      - master
      - develop/*
  repository_dispatch:
    types: [sync-unm]

env:
  UNM_REPO: UnblockNeteaseMusic/server
  UNM_BRANCH: enhanced

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    if: github.repository == 'liem0352/dolby_beta'

    steps:
      - name: Checkout dolby_beta
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Fetch latest UnblockNeteaseMusic
        id: fetch_unm
        run: |
          echo "Fetching latest from ${{ env.UNM_REPO }}..."

          git clone --depth=1 --branch=${{ env.UNM_BRANCH }} \
            https://github.com/${{ env.UNM_REPO }}.git unm_temp

          cd unm_temp
          echo "Latest commit: $(git log -1 --format='%H %s')"
          echo "unm_commit=$(git log -1 --format='%H')" >> $GITHUB_OUTPUT
          cd ..

          cd unm_temp && zip -r ../UnblockNeteaseMusic.zip . -x "*.git*" && cd ..

          rm -rf unm_temp

          echo "Old hash: $(cat .unm_last_commit 2>/dev/null || echo 'none')"
          echo "New hash: $(cat .unm_last_commit 2>/dev/null || echo 'none')"

      - name: Check if update needed
        id: check_update
        run: |
          NEW_COMMIT="${{ steps.fetch_unm.outputs.unm_commit }}"
          OLD_COMMIT=$(cat .unm_last_commit 2>/dev/null || echo "")

          echo "New commit: $NEW_COMMIT"
          echo "Old commit: $OLD_COMMIT"

          if [ "$NEW_COMMIT" != "$OLD_COMMIT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New UnblockNeteaseMusic commit detected!"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "No update needed, UnblockNeteaseMusic is up to date."
          fi

      - name: Update UnblockNeteaseMusic.zip
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          rm -f ./app/src/main/assets/UnblockNeteaseMusic.zip
          mv ./UnblockNeteaseMusic.zip ./app/src/main/assets/
          echo "${{ steps.fetch_unm.outputs.unm_commit }}" > .unm_last_commit

          echo "=== Updated UnblockNeteaseMusic.zip ==="
          ls -lh ./app/src/main/assets/UnblockNeteaseMusic.zip

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        if: steps.check_update.outputs.update_needed == 'true'
        run: ./gradlew app:assembleRelease --no-daemon

      - name: Upload APK artifact
        if: steps.check_update.outputs.update_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dolby-beta-unm-${{ github.run_number }}
          path: ${{github.workspace}}/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Commit if updated
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          git add ./app/src/main/assets/UnblockNeteaseMusic.zip .unm_last_commit
          git diff --cached --quiet || git commit -m "chore: sync UnblockNeteaseMusic @$(cat .unm_last_commit)

          Auto-updated UnblockNeteaseMusic to latest commit:
          $(cat .unm_last_commit)

          Build: ${{ github.runNumber }}
          Workflow: ${{ github.workflow }}
          https://github.com/${{ env.UNM_REPO }}/commit/$(cat .unm_last_commit)"

          git push origin ${{ github.ref_name }}
